<!DOCTYPE html>
<html lang="tk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RUSLAND – Öwreniş paneli. XP, derejeleri, ders ilerlemenizi görüň.">
  <title>RUSLAND – Panel 📊</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇷🇺</text></svg>">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    /* ─── Dashboard Sayfası ─── */
    .dashboard-layout {
      min-height: 100vh;
      padding-top: 90px;
      padding-bottom: 60px;
    }

    /* ─── Kullanıcı Profil Kartı ─── */
    .profile-card {
      padding: 36px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-green), var(--accent-gold));
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
      animation: pulse 3s ease-in-out infinite;
    }

    .profile-info { flex: 1; }

    .profile-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .profile-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--glass-border);
    }

    .profile-stat {
      text-align: center;
    }

    .profile-stat-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      display: block;
      margin-bottom: 4px;
    }

    .profile-stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ─── Genel İlerleme ─── */
    .progress-card {
      padding: 28px;
      margin-bottom: 32px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .progress-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }

    .progress-percent {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent-blue);
    }

    /* ─── Seviye Kartları ─── */
    .levels-section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      margin-bottom: 24px;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }

    #levels-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .level-card {
      padding: 28px;
      position: relative;
      overflow: hidden;
      transition: var(--transition-normal);
    }

    .level-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--level-color, var(--accent-blue));
    }

    .level-card.locked {
      opacity: 0.55;
      filter: saturate(0.4);
    }

    .level-card.locked:hover {
      transform: none;
      border-color: var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    .level-card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .level-card-icon {
      font-size: 2rem;
      width: 52px;
      height: 52px;
      border-radius: var(--radius-md);
      background: var(--level-color-dim, rgba(0,212,255,0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .level-info { flex: 1; }

    .level-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .level-xp-req {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .lock-badge {
      font-size: 1.6rem;
      opacity: 0.6;
    }

    .level-progress-section {
      margin-bottom: 20px;
    }

    .level-progress-label {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .level-progress-pct {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* ─── Ders Listesi ─── */
    .lesson-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .lesson-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
      transition: var(--transition-normal);
      font-size: 0.88rem;
    }

    .lesson-item.unlocked {
      cursor: pointer;
      background: rgba(255,255,255,0.03);
    }

    .lesson-item.unlocked:hover {
      background: rgba(0,212,255,0.08);
      border-color: rgba(0,212,255,0.3);
      transform: translateX(4px);
    }

    .lesson-item.completed {
      background: rgba(0,255,136,0.06);
      border-color: rgba(0,255,136,0.2);
    }

    .lesson-item.locked {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .lesson-icon { font-size: 1.1rem; }

    .lesson-title {
      flex: 1;
      color: var(--text-primary);
      font-weight: 500;
    }

    .lesson-status { font-size: 0.9rem; }

    .lesson-xp {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      color: var(--accent-gold);
      background: var(--accent-gold-dim);
      padding: 2px 8px;
      border-radius: var(--radius-full);
    }

    .locked-msg {
      text-align: center;
      padding: 12px;
      color: var(--text-muted);
      font-size: 0.88rem;
      border: 1px dashed var(--glass-border);
      border-radius: var(--radius-md);
    }

    /* ─── Son Aktivite ─── */
    .activity-section {
      margin-top: 40px;
    }

    .activity-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    .activity-list {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    #recent-activity { padding: 8px; }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: var(--transition-fast);
    }

    .activity-item:last-child { border-bottom: none; }
    .activity-item:hover { background: rgba(255,255,255,0.03); }

    .activity-icon { font-size: 1.4rem; }

    .activity-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .activity-title-text {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .activity-level {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .activity-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .activity-xp {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.78rem;
      color: var(--accent-gold);
    }

    .activity-date {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .profile-stats { grid-template-columns: repeat(2, 1fr); }
      #levels-container { grid-template-columns: 1fr; }
      .profile-header { flex-direction: column; text-align: center; }
      .profile-meta { justify-content: center; }
    }

    @media (max-width: 480px) {
      .profile-stats { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .lesson-xp { display: none; }
    }
  </style>
</head>
<body>
<div class="stars-bg" id="stars-bg"></div>

<!-- ─── Navbar ─── -->
<nav class="navbar">
  <a href="index.html" class="navbar-brand">🇷🇺 RUSLAND</a>
  <ul class="navbar-nav">
    <li>
      <span class="xp-badge">⭐ <span id="nav-xp">0 XP</span></span>
    </li>
    <li>
      <span style="color:var(--text-secondary);font-size:0.9rem">👤 <span id="nav-username"></span></span>
    </li>
    <li>
      <button class="btn btn-sm btn-secondary" id="btn-logout">🚪 Çyk</button>
    </li>
  </ul>
</nav>

<main class="dashboard-layout">
  <div class="container">

    <!-- ─── Profil Kartı ─── -->
    <div class="glass-card profile-card animate-fadeIn">
      <div class="profile-header">
        <div class="profile-avatar">🎓</div>
        <div class="profile-info">
          <div class="profile-name" id="user-name">–</div>
          <div class="profile-meta">
            <span class="xp-badge">⭐ <span id="user-xp">0 XP</span></span>
            <span style="background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:#A855F7;padding:6px 14px;border-radius:999px;font-size:0.85rem;font-weight:600" id="user-badge">🐣 Täze</span>
            <span style="color:var(--text-muted);font-size:0.85rem">🎂 <span id="user-age">–</span></span>
          </div>
        </div>
      </div>

      <div class="profile-stats">
        <div class="profile-stat">
          <span class="profile-stat-val neon-text-blue" id="completed-count">0</span>
          <span class="profile-stat-label">Tamamlanan</span>
        </div>
        <div class="profile-stat">
          <span class="profile-stat-val neon-text-green" id="total-count">0</span>
          <span class="profile-stat-label">Jemi Ders</span>
        </div>
        <div class="profile-stat">
          <span class="profile-stat-val neon-text-gold">4</span>
          <span class="profile-stat-label">Dereje</span>
        </div>
        <div class="profile-stat">
          <span class="profile-stat-val" style="color:var(--accent-purple)">7</span>
          <span class="profile-stat-label">Oýun Görnüşi</span>
        </div>
      </div>
    </div>

    <!-- ─── Genel İlerleme ─── -->
    <div class="glass-card progress-card animate-fadeInUp" style="animation-delay:0.2s">
      <div class="progress-header">
        <span class="progress-title">⚡ Genel Öwreniş Ösüşi</span>
        <span class="progress-percent" id="overall-progress-pct">0%</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="overall-progress-bar" style="width:0%"></div>
      </div>
      <p style="font-size:0.8rem;color:var(--text-muted);margin-top:10px">
        Hemme dersleri tamamlamak üçin 5000 XP gerek
      </p>
    </div>

    <!-- ─── Seviyeler ─── -->
    <div class="levels-section-title animate-fadeIn" style="animation-delay:0.3s">
      📚 Öwreniş Dereje we Dersleri
    </div>
    <div id="levels-container">
      <!-- Seviye kartları levels.js tarafından oluşturulur -->
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">
        ⏳ Derejeleri ýükleýäris...
      </div>
    </div>

    <!-- ─── Son Aktivite ─── -->
    <div class="activity-section animate-fadeInUp" style="animation-delay:0.5s">
      <div class="activity-title">🕐 Soňky Işler</div>
      <div class="activity-list">
        <div id="recent-activity">
          <p class="text-center" style="color:var(--text-muted);padding:24px 0">Ýüklenýär...</p>
        </div>
      </div>
    </div>

  </div>
</main>

<div class="toast-container" id="toast-container"></div>

<!-- Scripts -->
<script src="js/data/content.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/levels.js"></script>
</body>
</html>
